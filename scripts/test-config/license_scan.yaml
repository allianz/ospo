# Integration test configuration — targets the GitHub 'ospo-sandbox' organization.
# Not used in production.

issue_title: "Dependency License Violation"
docs_link: "https://github.com/allianz/ospo/blob/main/guides/standards_and_compliance.md"

excluded_repos:
  - ospo

deny-licenses:
  # Copyleft
  - GPL-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  # Commercial / source-available
  - BUSL-1.1
  - Elastic-2.0
  - SSPL-1.0
  - PolyForm-Noncommercial-1.0.0
  - PolyForm-Small-Business-1.0.0
