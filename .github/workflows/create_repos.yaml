---
name: Create repos
on:
  workflow_dispatch: null
  push:
    branches: [main]
    paths: ['config/create_repos.yaml']

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        app-id: ${{ secrets.ALLIANZ_APP_ID }}
        private-key: ${{ secrets.ALLIANZ_APP_PRIVATE_KEY }}
        owner: allianz

    - name: Dry-run create repositories and teams in allianz
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: scripts/create_repos.sh --org allianz --dry-run

  apply:
    needs: dry-run
    environment: github.com
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        app-id: ${{ secrets.ALLIANZ_APP_ID }}
        private-key: ${{ secrets.ALLIANZ_APP_PRIVATE_KEY }}
        owner: allianz

    - name: Create repositories and teams in allianz
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: scripts/create_repos.sh --org allianz
