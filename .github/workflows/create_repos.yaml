---
name: Create repos
on:
  workflow_dispatch: null
  push:
    branches: [main]
    paths: ['config/create_repos.yaml']

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 26

    - name: Install dependencies
      run: npm ci
      working-directory: scripts

    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        app-id: ${{ secrets.ALLIANZ_APP_ID }}
        private-key: ${{ secrets.ALLIANZ_APP_PRIVATE_KEY }}
        owner: allianz

    - name: Dry-run create repositories and teams in allianz
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      run: node scripts/create_repos.js --org allianz --dry-run

  apply:
    needs: dry-run
    environment: github.com
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 26

    - name: Install dependencies
      run: npm ci
      working-directory: scripts

    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      id: app-token
      with:
        app-id: ${{ secrets.ALLIANZ_APP_ID }}
        private-key: ${{ secrets.ALLIANZ_APP_PRIVATE_KEY }}
        owner: allianz

    - name: Create repositories and teams in allianz
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      run: node scripts/create_repos.js --org allianz
