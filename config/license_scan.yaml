# ──────────────────────────────────────────────────────────────────────────────
# Allianz OSPO — Third-Party License Policy
#
# This file configures the license_scan.js script, which scans all repositories
# in the organization for dependencies with non-compliant licenses.
#
# Parameters:
#   issue_title:     Title of the GitHub issue created in non-compliant repos.
#                    Also used as the lookup key when searching for existing issues.
#   docs_link:       URL inserted into the issue body as the license policy link.
#   excluded_repos:  Repos to skip entirely — no checks run, no issues created.
#   deny-licenses:   SPDX identifiers of licenses that are not permitted.
#
# Want to propose a change? Open a pull request and describe your reasoning.

# ──────────────────────────────────────────────────────────────────────────────

issue_title: "Dependency License Violation"
docs_link: ""
excluded_repos: []

deny-licenses:
  # Copyleft
  - GPL-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  # Commercial / source-available
  - BUSL-1.1
  - Elastic-2.0
  - SSPL-1.0
  - PolyForm-Noncommercial-1.0.0
  - PolyForm-Small-Business-1.0.0
