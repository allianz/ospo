# ──────────────────────────────────────────────────────────────────────────────
# Allianz OSPO — Dependency License Deny List
#
# Consumed by .github/workflows/dependency_review.yml on every pull request.
# Copyleft licenses listed here will fail the PR check if any newly introduced
# dependency carries one of these licenses.
#
# Vulnerability scanning is intentionally disabled — this workflow is
# license-only. CVE scanning is handled separately.
#
# License identifiers must be valid SPDX expressions:
# https://spdx.org/licenses/
# ──────────────────────────────────────────────────────────────────────────────

vulnerability-check: false

deny-licenses:
  # ── Strong copyleft (GPL family) ──────────────────────────────────────────
  # Any code linked against GPL-licensed dependencies must itself be GPL.
  # Both the modern SPDX suffixed forms and the legacy bare forms are listed
  # because package registries (npm, Maven) emit both in the wild.
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-2.0           # legacy bare form
  - GPL-3.0-only
  - GPL-3.0-or-later
  - GPL-3.0           # legacy bare form

  # ── Network copyleft (AGPL) ───────────────────────────────────────────────
  # AGPL extends GPL copyleft to network use — particularly relevant for
  # SaaS / server-side applications.
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - AGPL-3.0          # legacy bare form

  # ── Weak copyleft (LGPL family) ───────────────────────────────────────────
  # LGPL permits dynamic linking without triggering copyleft, but static
  # linking or modification requires source disclosure.
  - LGPL-2.0-only
  - LGPL-2.0-or-later
  - LGPL-2.0          # legacy bare form
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - LGPL-2.1          # legacy bare form
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - LGPL-3.0          # legacy bare form

  # ── Weak copyleft (file-scoped / patent-grant licenses) ───────────────────
  # MPL-2.0: copyleft applies per-file; requires source availability for
  # modified MPL files.
  - MPL-2.0

  # ── European Union Public Licence ─────────────────────────────────────────
  # EUPL is a copyleft licence with compatibility provisions for specific
  # other licences.
  - EUPL-1.1
  - EUPL-1.2

  # ── Common Development and Distribution License ───────────────────────────
  # CDDL-1.0: weak copyleft, file-scoped; not compatible with GPL.
  - CDDL-1.0

  # ── Eclipse Public License ────────────────────────────────────────────────
  # EPL-1.0 / EPL-2.0: weak copyleft with patent termination clauses.
  - EPL-1.0
  - EPL-2.0

  # ── Common Public Attribution License ────────────────────────────────────
  # CPAL-1.0: AGPL-like attribution requirement ("Powered by" display).
  - CPAL-1.0

  # ── Open Software License ─────────────────────────────────────────────────
  # OSL-3.0: strong copyleft with network-use trigger similar to AGPL.
  - OSL-3.0
  - MIT
